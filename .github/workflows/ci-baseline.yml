name: ci-baseline

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarqube:
    name: SonarQube analysis
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up JDK 8
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: "8"
          distribution: zulu

      - name: Cache SonarQube packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build with Java 8
        run: mvn -B verify -Dgpg.skip=true

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: "17"
          distribution: zulu

      - name: Analyze with SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=JCPrieto_hibernate-generic-dao -Dsonar.qualitygate.wait=true

  baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Run baseline verify
        id: baseline_run
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail
          START=$(date +%s)
          mvn clean verify -Dgpg.skip=true 2>&1 | tee build.log
          STATUS=${PIPESTATUS[0]}
          END=$(date +%s)
          DURATION=$((END-START))
          echo "status=${STATUS}" >> "${GITHUB_OUTPUT}"
          echo "duration_seconds=${DURATION}" >> "${GITHUB_OUTPUT}"

      - name: Collect baseline metrics
        if: always()
        shell: bash
        run: |
          .github/scripts/collect-baseline-metrics.sh \
            build.log \
            baseline-metrics \
            "${{ steps.baseline_run.outputs.status }}" \
            "${{ steps.baseline_run.outputs.duration_seconds }}"

      - name: Publish baseline summary
        if: always()
        shell: bash
        run: |
          cat baseline-metrics/baseline-summary.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload baseline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: baseline-metrics
          path: |
            build.log
            baseline-metrics/baseline-metrics.json
            baseline-metrics/baseline-summary.md
            baseline-metrics/build-clean.log

      - name: Fail on verify error
        if: steps.baseline_run.outputs.status != '0'
        shell: bash
        run: |
          echo "mvn clean verify failed with status ${{ steps.baseline_run.outputs.status }}"
          exit 1
